<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SURVIVOR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#020408;overflow:hidden;font-family:'Rajdhani',sans-serif;touch-action:none;user-select:none;}
canvas{display:block;}
#hud{position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 8px;background:linear-gradient(180deg,rgba(2,4,8,.92)0%,transparent 100%);}
#hp-section{min-width:210px;}
#hp-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.28);margin-bottom:5px;}
#hp-row{display:flex;align-items:center;gap:9px;}
#hp-num{font-family:'Orbitron',sans-serif;font-size:12px;color:#ff6b6b;min-width:64px;}
#hp-track{flex:1;height:11px;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden;position:relative;}
#hp-fill{height:100%;border-radius:6px;transition:width .15s,background .3s;}
#hp-track::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,.1);border-radius:6px;}
#score-block{text-align:center;}
#score-val{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#ffd700;text-shadow:0 0 24px rgba(255,215,0,.5);letter-spacing:2px;}
#score-lbl{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.28);}
#right-block{text-align:right;min-width:120px;padding-right:88px;}
#wave-val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:#a29bfe;}
#kill-val{font-family:'Rajdhani',sans-serif;font-size:13px;color:#fd79a8;letter-spacing:1px;margin-top:2px;}
#time-val{font-family:'Orbitron',sans-serif;font-size:11px;color:rgba(255,255,255,.35);margin-top:1px;}
#xp-wrap{height:5px;background:rgba(255,255,255,.05);position:relative;}
#xp-fill{height:100%;background:linear-gradient(90deg,#6c5ce7,#a29bfe,#fd79a8);transition:width .3s;}
#xp-lv{position:absolute;right:8px;top:-16px;font-family:'Orbitron',sans-serif;font-size:10px;color:#a29bfe;}
#boss-bar-wrap{padding:6px 18px 4px;display:none;background:rgba(0,0,0,.3);}
#boss-name-txt{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:5px;color:#ff4757;text-align:center;margin-bottom:5px;text-shadow:0 0 14px rgba(255,71,87,.7);animation:bossNamePulse 1s ease-in-out infinite alternate;}
@keyframes bossNamePulse{from{opacity:.7;}to{opacity:1;text-shadow:0 0 28px rgba(255,71,87,1);}}
#boss-hp-track{height:16px;background:rgba(255,255,255,.06);border-radius:8px;overflow:hidden;border:1px solid rgba(255,71,87,.35);box-shadow:0 0 20px rgba(255,71,87,.2);}
#boss-hp-fill{height:100%;background:linear-gradient(90deg,#6c0a00,#c0392b,#ff4757,#ff6b81);border-radius:8px;transition:width .12s;position:relative;}
#boss-hp-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,.18);border-radius:8px;}
#boss-phase{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.35);text-align:center;margin-top:3px;}
#upg-bar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:20;pointer-events:none;flex-wrap:wrap;justify-content:center;max-width:90vw;}
.upg-slot{width:46px;height:46px;border-radius:11px;background:rgba(5,8,18,.8);border:1px solid rgba(255,255,255,.14);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:21px;position:relative;backdrop-filter:blur(8px);}
.upg-slot .slv{position:absolute;bottom:2px;right:4px;font-family:'Orbitron',sans-serif;font-size:8px;color:#ffd700;font-weight:900;}
.upg-slot .sbar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 11px 11px;background:linear-gradient(90deg,#6c5ce7,#a29bfe);}
.overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:60;background:rgba(2,4,8,.9);backdrop-filter:blur(20px);}
.overlay.show{display:flex;}
#start-screen .logo{font-family:'Orbitron',sans-serif;font-size:clamp(50px,13vw,110px);font-weight:900;letter-spacing:14px;background:linear-gradient(135deg,#74b9ff 0%,#a29bfe 35%,#fd79a8 65%,#fdcb6e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 40px rgba(162,155,254,.4));animation:logoFloat 3s ease-in-out infinite;}
@keyframes logoFloat{0%,100%{filter:drop-shadow(0 0 30px rgba(162,155,254,.3));}50%{filter:drop-shadow(0 0 60px rgba(162,155,254,.6));}}
#start-screen .tagline{font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:6px;color:rgba(255,255,255,.3);margin:8px 0 50px;}
.btn{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:5px;padding:16px 52px;border-radius:5px;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;margin:5px;}
.btn-primary{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:white;}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(108,92,231,.55);}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-size:11px;padding:11px 28px;}
.btn-outline:hover{background:rgba(255,255,255,.06);}
#end-title{font-family:'Orbitron',sans-serif;font-size:clamp(40px,10vw,84px);font-weight:900;letter-spacing:10px;text-align:center;margin-bottom:6px;}
#end-sub{font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-bottom:28px;text-align:center;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;width:min(380px,88vw);}
.stat-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;text-align:center;}
.stat-box .sv{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#ffd700;}
.stat-box .sl{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.3);margin-top:3px;}
#lvlup{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(2,4,8,.82);backdrop-filter:blur(12px);}
#lvlup.show{display:flex;}
#lvlup-title{font-family:'Orbitron',sans-serif;font-size:clamp(22px,5vw,42px);font-weight:900;color:#ffd700;letter-spacing:6px;margin-bottom:4px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
#lvlup-sub{font-size:12px;letter-spacing:4px;color:rgba(255,255,255,.28);margin-bottom:26px;}
.cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:0 14px;max-width:860px;pointer-events:all;}
.card{width:148px;background:rgba(8,10,22,.96);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:20px 14px;cursor:pointer;transition:all .22s;text-align:center;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(108,92,231,.15),transparent);opacity:0;transition:opacity .22s;}
.card:hover{border-color:#a29bfe;transform:translateY(-6px);box-shadow:0 16px 48px rgba(108,92,231,.35);}
.card:hover::before{opacity:1;}
.card .ci{font-size:34px;margin-bottom:9px;display:block;filter:drop-shadow(0 0 8px rgba(255,255,255,.15));transition:filter .2s;}
.card:hover .ci{filter:drop-shadow(0 0 16px rgba(162,155,254,.6));}
.card .cn{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:white;letter-spacing:1px;margin-bottom:5px;}
.card .cd{font-size:11px;color:rgba(255,255,255,.38);line-height:1.55;}
.card .clv{font-family:'Orbitron',sans-serif;font-size:9px;color:#ffd700;margin-top:5px;background:rgba(255,215,0,.08);border-radius:4px;padding:2px 6px;display:inline-block;}
.card.rare{border-color:rgba(253,121,168,.35);}
.card.rare:hover{border-color:#fd79a8;box-shadow:0 16px 48px rgba(253,121,168,.3);}
.card.epic{border-color:rgba(253,203,110,.35);}
.card.epic:hover{border-color:#fdcb6e;box-shadow:0 16px 48px rgba(253,203,110,.3);}
#wave-ann{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:45;pointer-events:none;text-align:center;display:none;}
.wa-txt{font-family:'Orbitron',sans-serif;font-size:clamp(28px,7vw,58px);font-weight:900;letter-spacing:8px;color:#a29bfe;text-shadow:0 0 40px rgba(162,155,254,.8);animation:waveIn .55s cubic-bezier(.34,1.56,.64,1) forwards;}
.wa-sub{font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.35);margin-top:6px;}
@keyframes waveIn{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
#boss-ann{position:fixed;inset:0;z-index:44;pointer-events:none;display:none;align-items:center;justify-content:center;flex-direction:column;}
.ba-title{font-family:'Orbitron',sans-serif;font-size:clamp(14px,3vw,22px);letter-spacing:8px;color:rgba(255,71,87,.7);margin-bottom:8px;}
.ba-name{font-family:'Orbitron',sans-serif;font-size:clamp(36px,9vw,80px);font-weight:900;color:#ff4757;letter-spacing:6px;text-shadow:0 0 60px rgba(255,71,87,.9),0 0 120px rgba(255,71,87,.4);animation:bossIn .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes bossIn{from{transform:scale(2);opacity:0;}to{transform:scale(1);opacity:1;}}
.ba-sub{font-size:12px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-top:10px;}
#dmg-flash{position:fixed;inset:0;pointer-events:none;z-index:14;opacity:0;transition:opacity .14s;}
#corner{position:fixed;top:10px;right:10px;z-index:70;display:flex;gap:7px;}
.cbtn{width:35px;height:35px;border-radius:8px;background:rgba(5,8,18,.7);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all .18s;}
.cbtn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);}
#minimap{position:fixed;bottom:68px;right:12px;z-index:20;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 4px 24px rgba(0,0,0,.5);}
#joy-zone{position:fixed;bottom:0;left:0;width:52%;height:46%;z-index:25;pointer-events:all;}
#joy-base{position:absolute;width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.18);display:none;transform:translate(-50%,-50%);}
#joy-knob{position:absolute;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.5);transform:translate(-50%,-50%);}
#pause-screen .ovl-title{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;letter-spacing:10px;color:white;margin-bottom:8px;}
#pause-screen .ovl-sub{font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-bottom:32px;}
</style>

</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="topbar">
    <div id="hp-section">
      <div id="hp-label">❤ CAN</div>
      <div id="hp-row">
        <div id="hp-num">100/100</div>
        <div id="hp-track"><div id="hp-fill" style="width:100%"></div></div>
      </div>
    </div>
    <div id="score-block">
      <div id="score-val">0</div>
      <div id="score-lbl"><span data-tr="SKOR" data-en="SCORE">SKOR</span></div>
    </div>
    <div id="right-block">
      <div id="wave-val">1/100</div>
      <div id="kill-val">💀 0</div>
      <div id="time-val">0s</div>
    </div>
  </div>
  <div id="xp-wrap"><div id="xp-fill" style="width:0"></div><span id="xp-lv">LV 1</span></div>
  <div id="boss-bar-wrap">
    <div id="boss-name-txt">BOSS</div>
    <div id="boss-hp-track"><div id="boss-hp-fill" style="width:100%"></div></div>
    <div id="boss-phase">FAZI 1</div>
  </div>
</div>
<div id="upg-bar"></div>
<div id="dmg-flash"></div>
<canvas id="minimap" width="110" height="110"></canvas>
<div id="wave-ann"></div>
<div id="boss-ann" style="display:none;"></div>
<div id="corner">
  <button class="cbtn" id="pause-btn">⏸</button>
</div>
<div class="overlay show" id="start-screen">
  <div class="logo">SURVIVOR</div>
  <div class="tagline"><span data-tr="HAYATTA KAL · GÜÇLEN · 100 DALGA" data-en="SURVIVE · GROW STRONGER · 100 WAVES">HAYATTA KAL · GÜÇLEN · 100 DALGA</span></div>
  <button class="btn btn-primary" id="start-btn"><span data-tr="▶ OYNA" data-en="▶ PLAY">▶ OYNA</span></button>
  <div style="margin-top:14px;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.18)"><span data-tr="WASD / OK TUŞLARI · OTOMATİK ATEŞ" data-en="WASD / ARROW KEYS · AUTO FIRE">WASD / OK TUŞLARI · OTOMATİK ATEŞ</span></div>
</div>
<div class="overlay" id="end-screen">
  <div id="end-title"><span data-tr="ÖLDÜN" data-en="YOU DIED">ÖLDÜN</span></div>
  <div id="end-sub"></div>
  <div class="stats-grid">
    <div class="stat-box"><div class="sv" id="st-score">0</div><div class="sl">SKOR</div></div>
    <div class="stat-box"><div class="sv" id="st-kills">0</div><div class="sl"><span data-tr="ÖLDÜRME" data-en="KILLS">ÖLDÜRME</span></div></div>
    <div class="stat-box"><div class="sv" id="st-wave">0</div><div class="sl"><span data-tr="SON DALGA" data-en="LAST WAVE">SON DALGA</span></div></div>
    <div class="stat-box"><div class="sv" id="st-time">0s</div><div class="sl"><span data-tr="SÜRE" data-en="TIME">SÜRE</span></div></div>
  </div>
  <button class="btn btn-primary" id="restart-btn"><span data-tr="↺ TEKRAR OYNA" data-en="↺ PLAY AGAIN">↺ TEKRAR OYNA</span></button>
</div>
<div id="lvlup">
  <div id="lvlup-title"><span data-tr="⬆ SEVİYE ATLADIN!" data-en="⬆ LEVEL UP!">⬆ SEVİYE ATLADIN!</span></div>
  <div id="lvlup-sub"><span data-tr="BİR GÜÇLENDİRME SEÇ" data-en="CHOOSE AN UPGRADE">BİR GÜÇLENDİRME SEÇ</span></div>
  <div class="cards" id="cards-row"></div>
</div>
<div class="overlay" id="pause-screen">
  <div class="ovl-title"><span data-tr="DURAKLATILDI" data-en="PAUSED">DURAKLATILDI</span></div>
  <div class="ovl-sub"><span data-tr="DEVAM ETMEK İÇİN TIKLA" data-en="CLICK TO CONTINUE">DEVAM ETMEK İÇİN TIKLA</span></div>
  <button class="btn btn-outline" id="resume-btn"><span data-tr="▶ DEVAM" data-en="▶ RESUME">▶ DEVAM</span></button>
</div>
<div id="joy-zone"><div id="joy-base"><div id="joy-knob"></div></div></div>
<script>
var __LANG = localStorage.getItem('huseyinistan_lang') || 'tr';
const AC=new(window.AudioContext||window.webkitAudioContext)();
let muted=false;
const MV=AC.createGain();MV.connect(AC.destination);MV.gain.value=.5;
function tn(f,tp='sine',d=.1,v=.3,dl=0){if(muted)return;const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(MV);o.type=tp;o.frequency.value=f;const s=AC.currentTime+dl;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v,s+.01);g.gain.exponentialRampToValueAtTime(.0001,s+d);o.start(s);o.stop(s+d+.06);}
function nb(d=.05,v=.2,fq=1000){if(muted)return;const buf=AC.createBuffer(1,AC.sampleRate*d,AC.sampleRate);const da=buf.getChannelData(0);for(let i=0;i<da.length;i++)da[i]=Math.random()*2-1;const s=AC.createBufferSource(),g=AC.createGain(),fl=AC.createBiquadFilter();fl.type='bandpass';fl.frequency.value=fq;fl.Q.value=1;s.buffer=buf;s.connect(fl);fl.connect(g);g.connect(MV);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);s.start();s.stop(AC.currentTime+d+.06);}
const SFX={shoot(){tn(880,'square',.04,.1);},hitEnemy(){nb(.05,.1,3200);},killEnemy(){nb(.1,.24,1100);tn(120,'sawtooth',.14,.28);},xp(){tn(600,'sine',.07,.12);tn(800,'sine',.06,.1,.06);},lvlup(){[523,659,784,1047].forEach((f,i)=>tn(f,'sine',.28,.3,i*.1));},hurt(){tn(130,'sawtooth',.2,.42);nb(.12,.32,380);},death(){[260,210,170,130].forEach((f,i)=>tn(f,'sawtooth',.45,.42,i*.2));},bossEntry(){[100,130,160,200].forEach((f,i)=>tn(f,'sawtooth',.55,.5,i*.16));nb(.3,.55,180);},bossHurt(){nb(.08,.3,800);tn(160,'sawtooth',.08,.35);},explosion(){nb(.2,.55,550);tn(75,'sine',.4,.5);},freeze(){tn(1300,'sine',.18,.2);tn(900,'sine',.28,.15,.1);},lightning(){nb(.07,.32,4800);tn(480,'square',.05,.2);},bossPhase(){[200,300,400,500].forEach((f,i)=>tn(f,'sawtooth',.3,.4,i*.08));}};
const CV=document.getElementById('c'),cx=CV.getContext('2d');
const MC=document.getElementById('minimap'),mx=MC.getContext('2d');
function resize(){CV.width=window.innerWidth;CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const WORLD=3400,TILE=52;
const K={};
document.addEventListener('keydown',e=>{K[e.key]=true;if(e.key==='Escape')togglePause();AC.resume();});
document.addEventListener('keyup',e=>K[e.key]=false);
let jA=false,jX=0,jY=0,jDX=0,jDY=0;
const jZone=document.getElementById('joy-zone'),jBase=document.getElementById('joy-base'),jKnob=document.getElementById('joy-knob');
jZone.addEventListener('touchstart',e=>{const t=e.touches[0];jA=true;jX=t.clientX;jY=t.clientY;jBase.style.display='block';jBase.style.left=t.clientX+'px';jBase.style.top=t.clientY+'px';jKnob.style.left=t.clientX+'px';jKnob.style.top=t.clientY+'px';AC.resume();},{passive:true});
jZone.addEventListener('touchmove',e=>{if(!jA)return;const t=e.touches[0];const dx=t.clientX-jX,dy=t.clientY-jY;const dist=Math.min(42,Math.hypot(dx,dy));const ang=Math.atan2(dy,dx);jDX=Math.cos(ang)*(dist/42);jDY=Math.sin(ang)*(dist/42);jKnob.style.left=(jX+Math.cos(ang)*dist)+'px';jKnob.style.top=(jY+Math.sin(ang)*dist)+'px';},{passive:true});
['touchend','touchcancel'].forEach(ev=>jZone.addEventListener(ev,()=>{jA=false;jDX=0;jDY=0;jBase.style.display='none';},{passive:true}));
function getMD(){let dx=0,dy=0;if(K['ArrowLeft']||K['a']||K['A'])dx-=1;if(K['ArrowRight']||K['d']||K['D'])dx+=1;if(K['ArrowUp']||K['w']||K['W'])dy-=1;if(K['ArrowDown']||K['s']||K['S'])dy+=1;dx+=jDX;dy+=jDY;const l=Math.hypot(dx,dy);if(l>0){dx/=l;dy/=l;}return{dx,dy};}
const UPGRADES=[
  {id:'dmg',icon:'⚔️',name:'HASAR',desc:(__LANG==='en'?'Bullet damage +14':'Mermi hasarı +14'),max:10,rarity:'common',apply(p){p.dmgBonus+=14;}},
  {id:'spd',icon:'💨',name:'HIZ',desc:(__LANG==='en'?'Move speed +22':'Hareket hızı +22'),max:8,rarity:'common',apply(p){p.spdBonus+=22;}},
  {id:'maxhp',icon:'❤️',name:(__LANG==='en'?'HEALTH':'SAĞLIK'),desc:'Maks can +40',max:10,rarity:'common',apply(p){p.maxHp+=40;p.hp=Math.min(p.maxHp,p.hp+40);}},
  {id:'rapid',icon:'⚡',name:(__LANG==='en'?'RAPID FIRE':'HIZLI ATIŞ'),desc:(__LANG==='en'?'Fire rate +28%':'Ateş hızı %28 artar'),max:6,rarity:'common',apply(p){for(const w of p.weapons)w.maxCd=Math.max(.09,w.maxCd*.72);}},
  {id:'multishot',icon:'🔫',name:(__LANG==='en'?'DOUBLE SHOT':'ÇİFT ATIŞ'),desc:(__LANG==='en'?'+1 bullet count':'+1 mermi sayısı'),max:5,rarity:'rare',apply(p){for(const w of p.weapons)w.count++;}},

function nearEnemy(x,y,excl=[]){let best=null,bd=Infinity;for(const e of G.enemies){if(excl.includes(e.id))continue;const d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e;}}if(G.bossAlive&&G.boss){const d=Math.hypot(G.boss.x-x,G.boss.y-y);if(!excl.includes(G.boss.id)&&d<bd){best=G.boss;}}return best;}
function distSeg(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;if(!l2)return Math.hypot(px-ax,py-ay);const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));}

function updateWeapons(dt){const p=G.player;for(const w of p.weapons){w.cd-=dt;if(w.cd<=0){w.cd=w.maxCd;fireW(w);}}if(has('bomb')){G.bombCD-=dt;if(G.bombCD<=0){G.bombCD=4.2-ulv('bomb')*.5;fireBomb();}}if(has('lightning')){G.lightningCD-=dt;if(G.lightningCD<=0){G.lightningCD=3.2-ulv('lightning')*.35;doLightning();}}for(const t of G.turrets){t.cd-=dt;if(t.cd<=0){t.cd=t.maxCd;fireTurret(t);}}}

function explodeBomb(b){SFX.explosion();pfx(b.x,b.y,'#e17055',20,250,9);pfx(b.x,b.y,'#ffd700',10,180,6);const all=[...G.enemies,...(G.bossAlive&&G.boss?[G.boss]:[])].filter(Boolean);for(const e of all)if(Math.hypot(e.x-b.x,e.y-b.y)<b.boomR)dmgEnemy(e,b.dmg,{noCrit:true});}
function updateBoss(dt){const b=G.boss,p=G.player;if(!b)return;const adx=p.x-b.x,ady=p.y-b.y,dist=Math.hypot(adx,ady);const phase2=b.hp<b.maxHp*.5;if(phase2&&b.phase===1){b.phase=2;SFX.bossPhase();document.getElementById('boss-phase').textContent='FAZI 2';ft(b.x,b.y-b.r-20,'⚠ FAZ 2!','#ffd700',20);}const spdMul=phase2?1.45:1;
if(b.pattern==='eye'){if(dist>130)mvBoss(b,adx,ady,dist,spdMul*dt);b.pupilDilate=Math.sin(G.t*2)*.3;b.lazerTimer-=dt;if(!b.lazerActive&&b.lazerTimer<=0){b.lazerActive=true;b.lazerSweep=0;b.lazerAngle=Math.atan2(ady,adx);b.lazerTimer=b.lazerDur*(phase2?.7:1);}if(b.lazerActive){const sweepSpd=phase2?2.8:1.8;b.lazerSweep+=sweepSpd*dt;b.lazerAngle+=sweepSpd*dt;const lx=b.x+Math.cos(b.lazerAngle)*750,ly=b.y+Math.sin(b.lazerAngle)*750;if(p.iframes<=0&&distSeg(p.x,p.y,b.x,b.y,lx,ly)<24){const rd=Math.max(1,Math.round(b.dmg*1.8*(1-p.shield/100)));p.hp-=rd*dt*3.5;p.iframes=.08;updateHP();if(p.hp<=0){gameOver();return;}}if(b.lazerSweep>=b.lazerDur*(phase2?.7:1)){b.lazerActive=false;b.lazerTimer=b.lazerCD*(phase2?.6:1);}}}

function levelUp(){const p=G.player;p.lv++;p.xp-=p.xpNext;p.xpNext=Math.round(p.xpNext*1.4);SFX.lvlup();paused=true;document.getElementById('xp-lv').textContent='LV '+p.lv;const screen=document.getElementById('lvlup');screen.classList.add('show');const row=document.getElementById('cards-row');row.innerHTML='';const avail=UPGRADES.filter(u=>(p.upgrades[u.id]||0)<u.max);const pool=avail.sort(()=>Math.random()-.5).slice(0,4);for(const u of pool){const lv=(p.upgrades[u.id]||0)+1;const card=document.createElement('div');card.className='card'+(u.rarity==='rare'?' rare':u.rarity==='epic'?' epic':'');card.innerHTML=`<span class="ci">${u.icon}</span><div class="cn">${u.name}</div><div class="cd">${u.desc}</div><div class="clv">LV ${lv}/${u.max} · ${u.rarity.toUpperCase()}</div>`;card.onclick=()=>{p.upgrades[u.id]=(p.upgrades[u.id]||0)+1;u.apply(p);screen.classList.remove('show');paused=false;updateUpgBar();};row.appendChild(card);}}

let last=0;
function loop(ts){const dt=Math.min((ts-last)/1000,.055);last=ts;if(running&&!paused)update(dt);if(running)draw();requestAnimationFrame(loop);}
document.getElementById('start-btn').onclick=()=>{AC.resume();document.getElementById('start-screen').classList.remove('show');initG();running=true;updateHP();updateXPBar();showWaveAnn(1,false);};
document.getElementById('restart-btn').onclick=()=>{AC.resume();document.getElementById('end-screen').classList.remove('show');document.getElementById('upg-bar').innerHTML='';document.getElementById('boss-bar-wrap').style.display='none';bossIdx=0;initG();running=true;paused=false;updateHP();updateXPBar();document.getElementById('wave-val').textContent='1/100';document.getElementById('kill-val').textContent='💀 0';document.getElementById('score-val').textContent='0';document.getElementById('xp-lv').textContent='LV 1';showWaveAnn(1,false);};
requestAnimationFrame(loop);
</script>

<script>
(function(){
  var L=localStorage.getItem('huseyinistan_lang')||'tr';
  document.querySelectorAll('[data-tr]').forEach(function(el){
    el.textContent=L==='en'?el.dataset.en:el.dataset.tr;
  });
})();
</script>
