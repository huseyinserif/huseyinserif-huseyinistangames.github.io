<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nonogram</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#1a1025;
  --surface:#231630;
  --border:#3d2d5a;
  --accent:#c77dff;
  --accent2:#7b2fff;
  --gold:#ffd166;
  --green:#06d6a0;
  --red:#ef476f;
  --text:#f0e6ff;
  --muted:#8b7aaa;
  --filled:#c77dff;
  --crossed:#3d2d5a;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Raleway',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px;gap:16px;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 50% 60% at 80% 10%,rgba(123,47,255,.12),transparent 55%),
    radial-gradient(ellipse 40% 50% at 10% 90%,rgba(199,125,255,.08),transparent 55%);
  pointer-events:none;
}

h1{
  font-size:clamp(2rem,5vw,3rem);font-weight:900;
  letter-spacing:.05em;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sub{
  font-family:'JetBrains Mono',monospace;
  font-size:.7rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;
  text-align:center;
}

/* PUZZLE PICKER */
.puzzle-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.ptab{
  font-family:'JetBrains Mono',monospace;font-size:.7rem;
  padding:5px 13px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.ptab:hover,.ptab.active{border-color:var(--accent);color:var(--accent);background:rgba(199,125,255,.1);}

/* STATS */
.stats{display:flex;gap:20px;align-items:center;}
.stat{text-align:center;}
.stat-v{font-family:'JetBrains Mono',monospace;font-size:1.5rem;color:var(--gold);line-height:1;}
.stat-l{font-size:.6rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;}
.sep{width:1px;height:32px;background:var(--border);}

/* MODE TOGGLE */
.mode-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.mode-btn{
  font-family:'Raleway',sans-serif;font-weight:700;font-size:.78rem;
  padding:8px 18px;border:none;cursor:pointer;transition:all .15s;
  background:var(--surface);color:var(--muted);
}
.mode-btn.active{background:var(--accent);color:#1a1025;}

/* BOARD */
.board-wrap{
  position:relative;display:inline-block;
}
.board-wrap::before{
  content:'';position:absolute;inset:-2px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  z-index:-1;opacity:.4;
}

#ngTable{
  border-collapse:collapse;
  background:var(--surface);
  border-radius:12px;overflow:hidden;
}

/* CLUE CELLS */
.clue-corner{background:var(--surface);}
.clue-col,.clue-row{
  background:var(--surface);
  font-family:'JetBrains Mono',monospace;
  font-size:.75rem;color:var(--muted);
  padding:4px 6px;
  white-space:pre;
  line-height:1.5;
  text-align:center;vertical-align:bottom;
}
.clue-row{text-align:right;vertical-align:middle;}
.clue-col.done,.clue-row.done{color:var(--accent);opacity:.5;}

/* GRID CELLS */
.cell{
  width:34px;height:34px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:background .08s,transform .06s;
  position:relative;user-select:none;
}
.cell:hover{filter:brightness(1.3);}
.cell.filled{
  background:var(--filled);
  box-shadow:inset 0 0 6px rgba(255,255,255,.15);
}
.cell.crossed{
  background:var(--crossed);
}
.cell.crossed::before,.cell.crossed::after{
  content:'';position:absolute;
  top:50%;left:50%;
  width:55%;height:2px;
  background:var(--muted);
  transform:translate(-50%,-50%) rotate(45deg);
  border-radius:2px;
}
.cell.crossed::after{transform:translate(-50%,-50%) rotate(-45deg);}

/* thick borders every 5 */
.cell.thick-right{border-right:2px solid var(--accent2);}
.cell.thick-bottom{border-bottom:2px solid var(--accent2);}

/* CONTROLS */
.controls{display:flex;gap:10px;}
.ctrl{
  font-family:'Raleway',sans-serif;font-weight:700;font-size:.82rem;
  padding:10px 22px;border-radius:10px;border:none;cursor:pointer;
  transition:transform .12s,box-shadow .15s;letter-spacing:.03em;
}
.ctrl:active{transform:scale(.95);}
#btnReset{background:var(--surface);color:var(--text);border:1px solid var(--border);}
#btnReset:hover{border-color:var(--accent);}
#btnCheck{background:linear-gradient(135deg,var(--gold),#e09400);color:#1a1025;}
#btnCheck:hover{box-shadow:0 0 18px rgba(255,209,102,.35);}
#btnReveal{background:linear-gradient(135deg,var(--green),#04a07a);color:#fff;}
#btnReveal:hover{box-shadow:0 0 18px rgba(6,214,160,.3);}

/* ERROR FLASH */
.cell.error{animation:errflash .35s ease;}
@keyframes errflash{0%,100%{background:var(--filled)}50%{background:var(--red)}}

/* WIN OVERLAY */
.win-overlay{
  position:fixed;inset:0;
  background:rgba(26,16,37,.92);
  backdrop-filter:blur(12px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:99;
  opacity:0;pointer-events:none;transition:opacity .4s;
}
.win-overlay.show{opacity:1;pointer-events:all;}
.win-em{font-size:4rem;animation:spin 2s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.win-title{
  font-size:2.8rem;font-weight:900;letter-spacing:.08em;
  background:linear-gradient(90deg,var(--gold),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.win-desc{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--muted);text-align:center;line-height:2;}
.win-desc span{color:var(--gold);}
#btnWinNew{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-family:'Raleway',sans-serif;font-weight:700;
  font-size:1rem;padding:13px 36px;border-radius:12px;border:none;cursor:pointer;
  transition:transform .12s;
}
#btnWinNew:hover{transform:scale(1.05);}
/* ── MUTE BUTTON ── */
#muteBtn{
  position:fixed;top:12px;right:12px;z-index:200;
  font-size:1.2rem;width:36px;height:36px;
  border-radius:50%;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;
}
#muteBtn:hover{transform:scale(1.1);}

.preview-canvas{
  border-radius:8px;border:1px solid var(--border);
  image-rendering:pixelated;
}

/* ── MUSIC BUTTON ── */
#musicBtn{
  position:fixed;top:12px;right:54px;z-index:200;
  font-size:1.1rem;width:36px;height:36px;
  border-radius:50%;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;
}
#musicBtn:hover{transform:scale(1.1);}
#musicBtn.on{border-color:#ffb800;box-shadow:0 0 10px rgba(255,184,0,.3);}

</style>

</head>
<body>

<button id="muteBtn" title="Ses aç/kapat">🔊</button>
<div style="text-align:center">
  <h1>NONOGRAm</h1>
  <div class="sub"><span data-tr="Satır ve sütun ipuçlarıyla piksel resim çiz" data-en="Draw pixel art with row and column clues">Satır ve sütun ipuçlarıyla piksel resim çiz</span></div>
</div>

<div class="puzzle-tabs" id="puzzleTabs"></div>

<div class="stats">
  <div class="stat"><div class="stat-v" id="errVal">0</div><div class="stat-l">Hata</div></div>
  <div class="sep"></div>
  <div class="stat"><div class="stat-v" id="timeVal">0:00</div><div class="stat-l"><span data-tr="Süre" data-en="Time">Süre</span></div></div>
  <div class="sep"></div>
  <div class="stat"><div class="stat-v" id="pctVal">0%</div><div class="stat-l"><span data-tr="Tamamlandı" data-en="Completed">Tamamlandı</span></div></div>
</div>

<div class="mode-bar">
  <button class="mode-btn active" id="modeColor" onclick="setMode('fill')"><span data-tr="■ Doldur" data-en="■ Fill">■ Doldur</span></button>
  <button class="mode-btn" id="modeCross" onclick="setMode('cross')"><span data-tr="✕ Çarpı" data-en="✕ Cross">✕ Çarpı</span></button>
</div>

<div class="board-wrap"><table id="ngTable"></table></div>

<div class="controls">
  <button class="ctrl" id="btnReset" onclick="resetGrid()"><span data-tr="↺ Sıfırla" data-en="↺ Reset">↺ Sıfırla</span></button>
  <button class="ctrl" id="btnCheck" onclick="checkSolution()">✓ Kontrol</button>
  <button class="ctrl" id="btnReveal" onclick="revealSolution()"><span data-tr="💡 Çöz" data-en="💡 Solve">💡 Çöz</span></button>
</div>

<div class="win-overlay" id="winOverlay">
  <canvas class="preview-canvas" id="previewCanvas" width="100" height="100"></canvas>
  <div class="win-title"><span data-tr="MÜKEMMEL! 🎉" data-en="PERFECT! 🎉">MÜKEMMEL! 🎉</span></div>
  <div class="win-desc" id="winDesc"></div>
  <button id="btnWinNew" onclick="nextPuzzle()">Sonraki Bulmaca ➜</button>
</div>

<script>
var __LANG=localStorage.getItem('huseyinistan_lang')||'tr';

// ── MUSIC ENGINE ─────────────────────────────────────────────────────────────
const MUSIC = (() => {
  let ctx = null, playing = false, nodes = [], beatTimer = null;
  let masterGain = null, theme = 'default';

  const THEMES = {
    puzzle: { // Kayar Bulmaca - calm, methodical
      bpm: 90, scale: [261.63,293.66,329.63,349.23,392,440,493.88,523.25],
      bass: [65.41,73.42,82.41,87.31], bassPattern:[0,0,2,2,1,1,3,3],
      melody: [[0,2,4,5,4,2],[2,4,5,7,5,4],[0,2,4,7,5,4,2,0]],
      pad: true, arp: false, colors: 'blue'
    },
    chain: { // Zincir - mysterious, flowing
      bpm: 80, scale: [277.18,311.13,349.23,369.99,415.3,466.16,523.25,554.37],
      bass: [69.3,77.78,87.31,92.5], bassPattern:[0,2,1,3,0,2,3,1],
      melody: [[0,3,5,6,5,3],[2,5,6,7,6,5,3],[0,2,5,7,6,5,2]],
      pad: true, arp: true, colors: 'purple'
    },
    nonogram: { // Nonogram - pixelated, retro game
      bpm: 120, scale: [261.63,293.66,329.63,392,440,523.25,587.33,659.25],
      bass: [65.41,82.41,98,110], bassPattern:[0,0,1,0,2,0,1,3],
      melody: [[0,2,3,5,3,2],[2,3,5,7,5,3],[0,5,3,2,0,2,3,5]],
      pad: false, arp: true, colors: 'green'
    },
    wordle: { // Wordle - tense, thinking
      bpm: 75, scale: [246.94,277.18,311.13,329.63,369.99,415.3,466.16,493.88],
      bass: [61.74,69.3,77.78,82.41], bassPattern:[0,1,0,2,0,1,3,0],
      melody: [[0,1,3,4,3,1],[1,3,4,5,4,3,1],[0,3,4,6,4,3,1,0]],
      pad: true, arp: false, colors: 'green2'
    },
    mastermind: { // Mastermind - spy thriller, intense
      bpm: 100, scale: [233.08,261.63,277.18,311.13,369.99,415.3,466.16,493.88],
      bass: [58.27,65.41,73.42,77.78], bassPattern:[0,0,0,1,0,0,2,3],
      melody: [[0,2,1,3,2,0],[2,1,3,4,3,1],[0,3,2,5,4,2,1,0]],
      pad: true, arp: true, colors: 'blue2'
    },
    game2048: { // 2048 - driving, escalating
      bpm: 110, scale: [261.63,293.66,329.63,369.99,415.3,466.16,523.25,587.33],
      bass: [65.41,73.42,82.41,92.5], bassPattern:[0,2,0,3,1,2,0,3],
      melody: [[0,2,4,6,4,2],[2,4,6,7,6,4],[0,4,6,7,5,3,1,0]],
      pad: false, arp: true, colors: 'orange'
    }
  };

  let melodyIdx = 0, beatCount = 0, barCount = 0;

  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.18;
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function osc(freq, type, vol, start, dur, targetFreq) {
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.connect(g); g.connect(masterGain);
    o.type = type;
    o.frequency.setValueAtTime(freq, start);
    if (targetFreq) o.frequency.linearRampToValueAtTime(targetFreq, start + dur * 0.8);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.015);
    g.gain.setValueAtTime(vol, start + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.start(start); o.stop(start + dur + 0.05);
    return o;
  }

  function playBeat() {
    if (!playing) return;
    const c = getCtx();
    const t = c.currentTime;
    const cfg = THEMES[theme];
    const spb = 60 / cfg.bpm; // seconds per beat
    const beat = beatCount % 8;
    const bar  = Math.floor(beatCount / 8);

    // ── BASS ──
    const bassNote = cfg.bass[cfg.bassPattern[beat % cfg.bassPattern.length]];
    if (beat % 2 === 0) {
      osc(bassNote, 'triangle', 0.5, t, spb * 1.8);
      osc(bassNote * 2, 'sine', 0.15, t, spb * 0.9);
    }

    // ── DRUMS / RHYTHM ──
    if (beat === 0 || beat === 4) { // kick
      const ko = c.createOscillator(), kg = c.createGain();
      ko.connect(kg); kg.connect(masterGain);
      ko.frequency.setValueAtTime(150, t);
      ko.frequency.exponentialRampToValueAtTime(40, t + 0.15);
      kg.gain.setValueAtTime(0.7, t);
      kg.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      ko.start(t); ko.stop(t + 0.2);
    }
    if (beat === 2 || beat === 6) { // snare
      const buf = c.createBuffer(1, c.sampleRate * 0.12, c.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*20);
      const sn = c.createBufferSource(), sg = c.createGain();
      const sf = c.createBiquadFilter(); sf.type='bandpass'; sf.frequency.value=2000;
      sn.buffer=buf; sn.connect(sf); sf.connect(sg); sg.connect(masterGain);
      sg.gain.setValueAtTime(0.35, t);
      sg.gain.exponentialRampToValueAtTime(0.001, t+0.12);
      sn.start(t); sn.stop(t+0.13);
    }
    // hihat
    {
      const buf = c.createBuffer(1, c.sampleRate * 0.06, c.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*30);
      const hn = c.createBufferSource(), hg = c.createGain();
      const hf = c.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=7000;
      hn.buffer=buf; hn.connect(hf); hf.connect(hg); hg.connect(masterGain);
      hg.gain.setValueAtTime(beat%2===0?0.2:0.1, t);
      hg.gain.exponentialRampToValueAtTime(0.001, t+0.06);
      hn.start(t); hn.stop(t+0.07);
    }

    // ── MELODY ──
    if (beat % 2 === 0) {
      const mel = cfg.melody[barCount % cfg.melody.length];
      const ni = Math.floor((beat/2)) % mel.length;
      const freq = cfg.scale[mel[ni] % cfg.scale.length];
      osc(freq, 'triangle', 0.22, t + 0.01, spb * 1.6);
      // harmony 3rd above
      if (beat === 0 && barCount % 2 === 0) {
        const hi = (mel[ni] + 2) % cfg.scale.length;
        osc(cfg.scale[hi], 'sine', 0.08, t + 0.02, spb * 3);
      }
    }

    // ── ARP ──
    if (cfg.arp && beat % 1 === 0) {
      const arpScale = cfg.scale;
      const ai = (beatCount * 3) % arpScale.length;
      osc(arpScale[ai] * 2, 'square', 0.04, t + spb*0.5, spb * 0.45);
    }

    // ── PAD ──
    if (cfg.pad && beat === 0) {
      const padFreqs = [cfg.scale[0], cfg.scale[2], cfg.scale[4]];
      padFreqs.forEach((f, i) => {
        osc(f, 'sine', 0.06, t + i*0.05, spb * 7.5);
      });
    }

    beatCount++;
    if (beatCount % 8 === 0) barCount++;

    beatTimer = setTimeout(playBeat, spb * 1000 - 5);
  }

  function fadeIn() {
    if (!masterGain) return;
    masterGain.gain.setValueAtTime(0, getCtx().currentTime);
    masterGain.gain.linearRampToValueAtTime(0.18, getCtx().currentTime + 2);
  }

  function fadeOut(cb) {
    if (!masterGain) { if(cb) cb(); return; }
    masterGain.gain.setValueAtTime(masterGain.gain.value, getCtx().currentTime);
    masterGain.gain.linearRampToValueAtTime(0, getCtx().currentTime + 1.5);
    setTimeout(() => { playing = false; clearTimeout(beatTimer); if(cb)cb(); }, 1600);
  }

  return {
    start(t = 'default') {
      if (playing) return;
      theme = THEMES[t] ? t : 'puzzle';
      playing = true; beatCount = 0; barCount = 0; melodyIdx = 0;
      getCtx();
      fadeIn();
      playBeat();
    },
    stop(cb) { fadeOut(cb); },
    setTheme(t) {
      if (theme === t) return;
      fadeOut(() => { if(playing || true){ theme=t; playing=true; beatCount=0; barCount=0; fadeIn(); playBeat(); } });
    },
    isPlaying() { return playing; },
    setVol(v) { if(masterGain) masterGain.gain.value = v; },
    toggle(t) {
      if (playing) { fadeOut(); playing = false; return false; }
      else { this.start(t); return true; }
    }
  };
})();


// ── AUDIO ENGINE ─────────────────────────────────────────────────────────────
const SFX = (() => {
  let ctx = null;
  let muted = false;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, type, vol, attack, decay, dur) {
    if (muted) return;
    try {
      const c = ac();
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol, c.currentTime + attack);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + attack + decay);
      o.start(c.currentTime); o.stop(c.currentTime + dur);
    } catch(e){}
  }
  function chord(freqs, type, vol, dur) {
    freqs.forEach((f,i) => setTimeout(() => tone(f, type, vol, 0.01, dur, dur+0.05), i*70));
  }
  function noise(vol, dur) {
    if (muted) return;
    try {
      const c = ac();
      const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
      const src = c.createBufferSource();
      src.buffer = buf;
      const g = c.createGain();
      const f = c.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 800;
      src.connect(f); f.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(vol, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      src.start(); src.stop(c.currentTime + dur);
    } catch(e){}
  }
  return {
    toggleMute: () => { muted = !muted; return muted; },
    isMuted: () => muted,
    click:   () => tone(420, 'sine', 0.14, 0.005, 0.08, 0.09),
    tile:    () => tone(520 + Math.random()*80, 'triangle', 0.12, 0.005, 0.1, 0.11),
    merge:   (n) => { const f = 200 + Math.log2(n||2)*45; tone(f,'triangle',0.28,0.01,0.22,0.24); setTimeout(()=>tone(f*1.5,'sine',0.16,0.02,0.18,0.2),30); },
    win:     () => chord([523,659,784,1047],'sine',0.18,0.45),
    lose:    () => chord([220,185,155,130],'sawtooth',0.12,0.5),
    correct: () => chord([659,784,1047],'triangle',0.18,0.32),
    wrong:   () => { tone(180,'sawtooth',0.16,0.01,0.28,0.3); setTimeout(()=>tone(150,'sawtooth',0.1,0.01,0.2,0.22),120); },
    near:    () => tone(440,'triangle',0.15,0.01,0.15,0.17),
    type:    () => tone(600+Math.random()*200,'square',0.06,0.002,0.04,0.045),
    flip:    () => tone(300+Math.random()*150,'triangle',0.1,0.005,0.08,0.09),
    fill:    () => tone(480,'sine',0.12,0.005,0.1,0.11),

let currentPuzzleIdx = 0;

let mode = 'fill';

// ── CLUE COMPUTATION ──────────────────────────────────────────────────────────
function getClues(arr){
  const clues=[];let run=0;
  arr.forEach(v=>{if(v){run++;}else if(run){clues.push(run);run=0;}});
  if(run)clues.push(run);
  return clues.length?clues:[0];
}

// ── BUILD TABLE ───────────────────────────────────────────────────────────────
function buildTable(){
  const tbl = document.getElementById('ngTable');
  tbl.innerHTML='';

  const rowClues = solution.map(row=>getClues(row));
  const colClues = Array.from({length:N},(_,c)=>getClues(solution.map(r=>r[c])));
  const maxRowLen = Math.max(...rowClues.map(c=>c.length));
  const maxColLen = Math.max(...colClues.map(c=>c.length));

  // Header rows (column clues)
  for(let ci=0;ci<maxColLen;ci++){
    const tr=document.createElement('tr');
    // corner
    const corner=document.createElement('td');
    corner.colSpan=maxRowLen;corner.rowSpan=1;
    corner.className='clue-corner';
    tr.appendChild(corner);
    for(let c=0;c<N;c++){
      const td=document.createElement('td');
      td.className='clue-col';
      td.id=`cc${c}`;
      const clue=colClues[c];
      const offset=maxColLen-clue.length;
      td.textContent=ci>=offset?clue[ci-offset]:'';
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }

  // Data rows
  solution.forEach((row,r)=>{
    const tr=document.createElement('tr');
    // row clue
    const rclue=rowClues[r];
    const td0=document.createElement('td');
    td0.className='clue-row';td0.id=`rc${r}`;
    const offset=maxRowLen-rclue.length;
    let txt='';
    for(let i=0;i<maxRowLen;i++) txt+=(i>=offset?rclue[i-offset]:' ')+(i<maxRowLen-1?' ':'');
    td0.textContent=txt;
    tr.appendChild(td0);

    row.forEach((_,c)=>{
      const td=document.createElement('td');
      td.className='cell'+(c%5===4&&c<N-1?' thick-right':'')+(r%5===4&&r<N-1?' thick-bottom':'');
      td.id=`cell_${r}_${c}`;
      td.addEventListener('mousedown',e=>{e.preventDefault();onCellDown(r,c);});
      td.addEventListener('mouseenter',()=>onCellEnter(r,c));
      td.addEventListener('touchstart',e=>{e.preventDefault();onCellDown(r,c);},{passive:false});
      td.addEventListener('touchmove',e=>{
        e.preventDefault();
        const t=e.touches[0];
        const el=document.elementFromPoint(t.clientX,t.clientY);
        if(el&&el.classList.contains('cell')){
          const [,rr,cc]=el.id.split('_');
          onCellEnter(parseInt(rr),parseInt(cc));
        }
      },{passive:false});
      tr.appendChild(td);
    });
    tbl.appendChild(tr);
  });

  document.addEventListener('mouseup',()=>{isDragging=false;dragVal=null;});
  document.addEventListener('touchend',()=>{isDragging=false;dragVal=null;});
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function onCellDown(r,c){
  if(!started){started=true;startTimer();}
  isDragging=true;
  const cur=userGrid[r][c];
  if(mode==='fill') dragVal=cur===1?0:1;
  else dragVal=cur===2?0:2;
  applyCell(r,c);
}

function onCellEnter(r,c){
  if(!isDragging)return;
  applyCell(r,c);
}

function applyCell(r,c){
  if(dragVal===null)return;
  if(dragVal===1)SFX.fill(); else if(dragVal===2)SFX.place(); else SFX.erase();
  userGrid[r][c]=dragVal;
  renderCell(r,c);
  updateStats();
}

function renderCell(r,c){
  const td=document.getElementById(`cell_${r}_${c}`);
  td.classList.remove('filled','crossed','error');
  if(userGrid[r][c]===1)td.classList.add('filled');
  else if(userGrid[r][c]===2)td.classList.add('crossed');
}

function setMode(m){
  mode=m;
  document.getElementById('modeColor').classList.toggle('active',m==='fill');
  document.getElementById('modeCross').classList.toggle('active',m==='cross');
}

// ── STATS & CLUE CHECKING ─────────────────────────────────────────────────────
function updateStats(){
  let filled=0,total=0;
  solution.forEach((row,r)=>row.forEach((v,c)=>{if(v){total++;if(userGrid[r][c]===1)filled++;}}));
  document.getElementById('pctVal').textContent=Math.round(filled/total*100)+'%';
  // clue done highlight
  solution.forEach((_,r)=>{
    const sClue=getClues(solution[r]).join(',');
    const uClue=getClues(userGrid[r].map(v=>v===1?1:0)).join(',');
    const el=document.getElementById(`rc${r}`);
    if(el)el.classList.toggle('done',sClue===uClue);
  });
  for(let c=0;c<N;c++){
    const sClue=getClues(solution.map(r=>r[c])).join(',');
    const uClue=getClues(userGrid.map(r=>r[c]===1?1:0)).join(',');
    const el=document.getElementById(`cc${c}`);
    if(el)el.classList.toggle('done',sClue===uClue);
  }
}

function checkSolution(){
  let wrong=0;
  solution.forEach((row,r)=>row.forEach((v,c)=>{
    const td=document.getElementById(`cell_${r}_${c}`);
    td.classList.remove('error');
    if(v===1&&userGrid[r][c]!==1){wrong++;}
    else if(v===0&&userGrid[r][c]===1){
      wrong++;
      td.classList.add('error');
      setTimeout(()=>td.classList.remove('error'),400);
    }
  }));
  if(wrong>0){
    SFX.wrong(); errors+=wrong;
    document.getElementById('errVal').textContent=errors;
  } else {
    SFX.check(); onWin();
  }
}

function revealSolution(){
  solution.forEach((row,r)=>row.forEach((v,c)=>{
    userGrid[r][c]=v?1:0;renderCell(r,c);
  }));
  updateStats();
  setTimeout(onWin,400);
}

function resetGrid(){
  userGrid=Array.from({length:N},()=>Array(N).fill(0));
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)renderCell(r,c);
  updateStats();
}

// ── WIN ───────────────────────────────────────────────────────────────────────
function onWin(){
  clearInterval(timerInterval);
  const m=Math.floor(seconds/60),s=seconds%60;
  document.getElementById('winDesc').innerHTML=
    `<span>${puzzle.name}</span> ${__LANG==="en"?"completed!":"tamamlandı!"}<br>${__LANG==="en"?"Time":"Süre"}: <span>${m}:${s.toString().padStart(2,'0')}</span> · Hata: <span>${errors}</span>`;
  drawPreview();
  SFX.win(); setTimeout(()=>document.getElementById('winOverlay').classList.add('show'),200);
}

function drawPreview(){
  const cv=document.getElementById('previewCanvas');
  const cs=Math.floor(100/N);
  cv.width=cv.height=cs*N;
  const c=cv.getContext('2d');
  solution.forEach((row,r)=>row.forEach((v,col)=>{
    c.fillStyle=v?'#c77dff':'#231630';
    c.fillRect(col*cs,r*cs,cs,cs);
  }));
}

function nextPuzzle(){
  document.getElementById('winOverlay').classList.remove('show');
  currentPuzzleIdx=(currentPuzzleIdx+1)%PUZZLES.length;
  loadPuzzle(currentPuzzleIdx);
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    seconds++;
    const m=Math.floor(seconds/60),s=seconds%60;
    document.getElementById('timeVal').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  },1000);
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
function loadPuzzle(idx){
  puzzle=PUZZLES[idx];
  N=puzzle.size;
  solution=puzzle.grid;
  userGrid=Array.from({length:N},()=>Array(N).fill(0));
  errors=0;seconds=0;started=false;
  clearInterval(timerInterval);
  document.getElementById('errVal').textContent='0';
  document.getElementById('timeVal').textContent='0:00';
  document.getElementById('pctVal').textContent='0%';
  buildTable();
  // tab highlight
  document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',i===idx));
}
