<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>H.Ş.K - Gelişmiş Editör V44</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f5ff; --purple: #bf00ff; --dark: #050510; --panel: #0f1623; }
        body { margin: 0; background: var(--dark); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Giriş */
        #login-screen { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--panel); padding: 40px; border: 1px solid var(--cyan); border-radius: 15px; text-align: center; color: white; }
        input[type="password"] { background: #000; border: 1px solid var(--cyan); color: white; padding: 12px; border-radius: 5px; outline: none; text-align: center; font-family: 'Orbitron'; margin-bottom: 20px; }

        /* Üst Kontrol Paneli */
        .admin-bar { 
            height: 80px; background: var(--panel); border-bottom: 2px solid var(--cyan); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px;
            color: white; position: relative; z-index: 100;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn { 
            padding: 12px 18px; border-radius: 5px; border: none; cursor: pointer; 
            font-weight: bold; font-family: 'Orbitron'; font-size: 10px; transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-blue { background: var(--cyan); color: #000; }
        .btn-purple { background: var(--purple); color: #fff; }
        .btn-save { background: #2ecc71; color: white; border: 2px solid #27ae60; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        #editor-frame { width: 100%; height: calc(100vh - 80px); border: none; background: white; }
        #info-toast { position: fixed; bottom: 20px; right: 20px; background: var(--cyan); color: #000; padding: 10px 20px; border-radius: 5px; font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="auth-box">
            <h2 style="font-family:'Orbitron'; margin-bottom:20px;">SYSTEM ACCESS</h2>
            <input type="password" id="passInput" placeholder="ŞİFRE">
            <br>
            <button class="btn btn-blue" onclick="checkAuth()" style="width: 226px;">GİRİŞ</button>
        </div>
    </div>

    <div class="admin-bar">
        <div style="font-family:'Orbitron'; color:var(--cyan); font-size:18px;">H.Ş.K // PRO PANEL V44</div>
        
        <div class="btn-group">
            <button class="btn btn-blue" onclick="toggleEditMode()">✏️ YAZILARI DÜZENLE</button>
            <button class="btn btn-purple" onclick="addNewGame()">➕ YENİ OYUN EKLE</button>
            <button class="btn btn-save" onclick="saveFinal()">💾 KAYDET VE İNDİR</button>
        </div>
    </div>

    <div id="info-toast">DÜZENLEME MODU AKTİF</div>
    <iframe id="editor-frame"></iframe>

    <script>
        const frame = document.getElementById('editor-frame');
        let editMode = false;

        function checkAuth() {
            if(document.getElementById('passInput').value === 'btmal') {
                document.getElementById('login-screen').style.display = 'none';
                frame.src = "index.html?v=" + Date.now();
            } else { alert("Şifre Hatalı!"); }
        }

        // 1. Yazı Düzenleme Modu
        function toggleEditMode() {
            const doc = frame.contentDocument;
            editMode = !editMode;
            
            const elements = doc.querySelectorAll('h1, h2, h3, p, .game-name, .game-desc, .stat-value, .stat-label, span');
            
            elements.forEach(el => {
                el.contentEditable = editMode;
                el.style.outline = editMode ? "1px dashed var(--cyan)" : "none";
            });

            document.getElementById('info-toast').style.display = editMode ? "block" : "none";
            document.getElementById('info-toast').innerText = editMode ? "DÜZENLEME MODU: AÇIK" : "DÜZENLEME MODU: KAPALI";
        }

        // 2. Yeni Oyun Ekleme
        function addNewGame() {
            const doc = frame.contentDocument;
            const grid = doc.querySelector('.games-grid');
            
            if(!grid) { alert("Oyun alanı bulunamadı!"); return; }

            const gameName = prompt("Oyun Adı:", "Yeni Oyun");
            const gameEmoji = prompt("Emoji:", "🎮");
            const fileName = prompt("Dosya Adı (uzantılı):", "oyun.html");

            if(!gameName || !gameEmoji) return;

            const newCard = doc.createElement('div');
            newCard.className = 'game-card';
            newCard.setAttribute('onclick', `openGame('${fileName}','${gameName}')`);
            
            newCard.innerHTML = `
                <div class="game-thumbnail">
                    <div class="game-thumb-glow"></div>
                    ${gameEmoji}
                </div>
                <div class="game-info">
                    <div class="game-tag">⬡ SİSTEM AKTİF</div>
                    <div class="game-name">${gameName}</div>
                    <div class="game-desc">Yeni eklenen harika bir oyun.</div>
                    <div class="game-footer"><button class="btn-play">Oyna ▶</button></div>
                </div>
            `;

            grid.insertBefore(newCard, grid.firstChild); // En başa ekle
            newCard.scrollIntoView({behavior: "smooth"});
            alert("Oyun Eklendi! Şimdi üzerindeki yazılara tıklayarak açıklamayı düzeltebilirsin.");
        }

        // 3. Kaydetme
        function saveFinal() {
            const doc = frame.contentDocument;
            
            // Temizlik
            doc.querySelectorAll('*').forEach(el => {
                el.removeAttribute('contenteditable');
                el.style.outline = "none";
            });

            const html = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
            const blob = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
            
            alert("index.html başarıyla güncellendi. GitHub'a yüklemeyi unutma!");
            location.reload();
        }

        document.getElementById('passInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAuth(); });
    </script>
</body>
</html>
