<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastermind</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#070b14;
  --surface:#0d1424;
  --panel:#111c30;
  --border:#1e3050;
  --text:#a8d4ff;
  --muted:#3a5a80;
  --bright:#e0f4ff;
  --c1:#ff3b5c;
  --c2:#ff8c00;
  --c3:#ffe000;
  --c4:#00e676;
  --c5:#2979ff;
  --c6:#e040fb;
  --black-peg:#0a1628;
  --white-peg:#c8dff5;
  --hit:#e0f4ff;
  --near:#4a90d9;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 12px 40px;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%,rgba(41,121,255,.1),transparent 60%),
    radial-gradient(ellipse 30% 40% at 90% 80%,rgba(224,64,251,.06),transparent 50%);
  pointer-events:none;
}

/* grid lines */
body::after{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(41,121,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(41,121,255,.03) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
}

/* ── HEADER ── */
header{
  width:100%;max-width:520px;
  padding:20px 0 14px;
  text-align:center;
  border-bottom:1px solid var(--border);
  margin-bottom:18px;
}

.logo{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.8rem,6vw,2.8rem);
  font-weight:900;letter-spacing:.15em;
  color:var(--bright);
  text-shadow:0 0 20px rgba(168,212,255,.5),0 0 60px rgba(41,121,255,.3);
}

.tagline{
  font-size:.65rem;letter-spacing:.2em;color:var(--muted);
  margin-top:5px;text-transform:uppercase;
}

/* ── DIFFICULTY ── */
.diff-bar{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.diff-btn{
  font-family:'Share Tech Mono',monospace;font-size:.68rem;
  padding:5px 14px;border-radius:3px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted);cursor:pointer;transition:all .15s;
  letter-spacing:.1em;
}
.diff-btn:hover,.diff-btn.active{
  border-color:#2979ff;color:#2979ff;
  background:rgba(41,121,255,.1);
  box-shadow:0 0 10px rgba(41,121,255,.2);
}

/* ── STATS ── */
.stats{
  display:flex;gap:0;border:1px solid var(--border);
  border-radius:4px;overflow:hidden;margin-bottom:16px;
  font-size:.62rem;letter-spacing:.1em;
}
.stat{padding:8px 16px;text-align:center;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.stat-v{font-family:'Orbitron',sans-serif;font-size:1.2rem;color:#2979ff;display:block;line-height:1;margin-bottom:3px;}

/* ── MESSAGE ── */
#msg{
  height:24px;font-size:.7rem;letter-spacing:.12em;
  text-align:center;color:#2979ff;margin-bottom:10px;
  transition:opacity .3s;
}

/* ── BOARD ── */
#board{
  width:100%;max-width:480px;
  display:flex;flex-direction:column;gap:6px;
  margin-bottom:16px;
}

.guess-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:6px;
  background:var(--surface);
  transition:border-color .2s,box-shadow .2s;
  position:relative;
}

.guess-row.active{
  border-color:#2979ff;
  box-shadow:0 0 12px rgba(41,121,255,.2);
}

.row-num{
  font-size:.65rem;color:var(--muted);
  min-width:18px;text-align:center;
}

.pegs{display:flex;gap:7px;flex:1;justify-content:center;}

.peg{
  width:clamp(34px,8vw,42px);
  height:clamp(34px,8vw,42px);
  border-radius:50%;
  border:2px solid var(--border);
  background:var(--panel);
  cursor:pointer;
  transition:all .15s;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}

.peg::after{
  content:'';position:absolute;
  width:35%;height:35%;border-radius:50%;
  background:rgba(255,255,255,.25);
  top:18%;left:20%;
}

.peg:hover:not(.locked){
  filter:brightness(1.3);
  transform:scale(1.08);
}

.peg.c1{background:var(--c1);border-color:var(--c1);box-shadow:0 0 10px rgba(255,59,92,.4);}
.peg.c2{background:var(--c2);border-color:var(--c2);box-shadow:0 0 10px rgba(255,140,0,.4);}
.peg.c3{background:var(--c3);border-color:var(--c3);box-shadow:0 0 10px rgba(255,224,0,.4);}
.peg.c4{background:var(--c4);border-color:var(--c4);box-shadow:0 0 10px rgba(0,230,118,.4);}
.peg.c5{background:var(--c5);border-color:var(--c5);box-shadow:0 0 10px rgba(41,121,255,.4);}
.peg.c6{background:var(--c6);border-color:var(--c6);box-shadow:0 0 10px rgba(224,64,251,.4);}

/* feedback mini-pegs */
.feedback{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
  min-width:32px;
}

.fb-peg{
  width:12px;height:12px;border-radius:50%;
  background:var(--panel);border:1px solid var(--border);
}
.fb-peg.hit{background:var(--hit);border-color:var(--hit);box-shadow:0 0 5px rgba(224,244,255,.5);}
.fb-peg.near{background:var(--near);border-color:var(--near);}

/* ── COLOR PALETTE ── */
#palette{
  display:flex;gap:10px;justify-content:center;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.pal-peg{
  width:clamp(36px,9vw,48px);
  height:clamp(36px,9vw,48px);
  border-radius:50%;
  cursor:pointer;
  transition:transform .15s,box-shadow .2s;
  border:3px solid transparent;
  position:relative;
}
.pal-peg::after{
  content:'';position:absolute;
  width:35%;height:35%;border-radius:50%;
  background:rgba(255,255,255,.3);
  top:15%;left:18%;
}
.pal-peg:hover{transform:scale(1.15);}
.pal-peg.selected{
  border-color:white;
  transform:scale(1.18);
  box-shadow:0 0 18px rgba(255,255,255,.4);
}
.pal-peg.p1{background:var(--c1);box-shadow:0 0 10px rgba(255,59,92,.3);}
.pal-peg.p2{background:var(--c2);box-shadow:0 0 10px rgba(255,140,0,.3);}
.pal-peg.p3{background:var(--c3);box-shadow:0 0 10px rgba(255,224,0,.3);}
.pal-peg.p4{background:var(--c4);box-shadow:0 0 10px rgba(0,230,118,.3);}
.pal-peg.p5{background:var(--c5);box-shadow:0 0 10px rgba(41,121,255,.3);}
.pal-peg.p6{background:var(--c6);box-shadow:0 0 10px rgba(224,64,251,.3);}

/* palette label */
.pal-label{
  font-size:.6rem;color:var(--muted);
  text-align:center;letter-spacing:.12em;
  margin-bottom:6px;
}

/* ── CONTROLS ── */
.controls{display:flex;gap:10px;justify-content:center;}
.ctrl{
  font-family:'Share Tech Mono',monospace;font-size:.75rem;
  letter-spacing:.12em;padding:10px 22px;border-radius:4px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text);cursor:pointer;transition:all .15s;
}
.ctrl:hover{border-color:#2979ff;color:#2979ff;}
.ctrl:active{transform:scale(.95);}
#btnConfirm{
  background:linear-gradient(135deg,#2979ff,#1a56d4);
  border-color:#2979ff;color:#fff;
}
#btnConfirm:hover{box-shadow:0 0 16px rgba(41,121,255,.4);}
#btnConfirm:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}

/* ── SECRET REVEAL ── */
#secretRow{
  display:flex;gap:7px;justify-content:center;
  margin:10px 0;
  opacity:0;transition:opacity .5s;
}
#secretRow.show{opacity:1;}

/* ── WIN OVERLAY ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(7,11,20,.93);
  backdrop-filter:blur(12px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:100;
  opacity:0;pointer-events:none;transition:opacity .4s;
}
.overlay.show{opacity:1;pointer-events:all;}
.ov-icon{font-size:3.5rem;animation:pulse 1.5s ease infinite alternate;}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.12)}}
.ov-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(1.8rem,6vw,2.8rem);
  font-weight:900;letter-spacing:.12em;
  text-align:center;line-height:1.1;
}
.ov-title.win{color:var(--c4);text-shadow:0 0 30px rgba(0,230,118,.4);}
.ov-title.lose{color:var(--c1);text-shadow:0 0 30px rgba(255,59,92,.4);}
.ov-info{font-size:.75rem;color:var(--muted);letter-spacing:.1em;text-align:center;line-height:2;}
.ov-info span{color:var(--text);}
.ov-secret{display:flex;gap:8px;justify-content:center;margin:4px 0;}
#btnOvNew{
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:.8rem;
  letter-spacing:.15em;padding:13px 32px;border-radius:4px;
  border:none;background:linear-gradient(135deg,#2979ff,#1a56d4);
  color:#fff;cursor:pointer;transition:transform .12s,box-shadow .15s;
}
#btnOvNew:hover{transform:scale(1.05);box-shadow:0 0 22px rgba(41,121,255,.45);}
/* ── MUTE BUTTON ── */
#muteBtn{
  position:fixed;top:12px;right:12px;z-index:200;
  font-size:1.2rem;width:36px;height:36px;
  border-radius:50%;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;
}
#muteBtn:hover{transform:scale(1.1);}


/* ── MUSIC BUTTON ── */
#musicBtn{
  position:fixed;top:12px;right:54px;z-index:200;
  font-size:1.1rem;width:36px;height:36px;
  border-radius:50%;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;
}
#musicBtn:hover{transform:scale(1.1);}
#musicBtn.on{border-color:#ffb800;box-shadow:0 0 10px rgba(255,184,0,.3);}

</style>

</head>
<body>

<button id="muteBtn" title="Ses aç/kapat">🔊</button>
<header>
  <div class="logo">MASTERMIND</div>
  <div class="tagline"><span data-tr="Gizli kodu kır · Renk sırasını bul" data-en="Crack the code · Find the color sequence">Gizli kodu kır · Renk sırasını bul</span></div>
</header>

<div class="diff-bar">
  <button class="diff-btn" data-d="4,6,8">🟢 Kolay (4 renk)</button>
  <button class="diff-btn active" data-d="4,6,10">🟡 Orta (6 renk)</button>
  <button class="diff-btn" data-d="5,6,10">🔴 Zor (5 konum)</button>
</div>

<div class="stats">
  <div class="stat"><span class="stat-v" id="sWin">0</span><span>KAZANMA</span></div>
  <div class="stat"><span class="stat-v" id="sPlay">0</span><span>OYNANAN</span></div>
  <div class="stat"><span class="stat-v" id="sBest">-</span><span><span data-tr="EN İYİ" data-en="BEST">EN İYİ</span></span></div>
</div>

<div id="msg">// Renk seç, pozisyona tıkla, onayla</div>

<div id="board"></div>

<div class="pal-label"><span data-tr="— RENK PALETİ —" data-en="— COLOR PALETTE —">— RENK PALETİ —</span></div>
<div id="palette"></div>

<div class="controls">
  <button class="ctrl" id="btnClear" onclick="clearRow()">✕ Temizle</button>
  <button class="ctrl" id="btnConfirm" disabled onclick="confirmRow()">▶ ONAYLA</button>
  <button class="ctrl" id="btnNew" onclick="newGame()">↺ Yeni</button>
</div>

<div id="secretRow"></div>

<div class="overlay" id="overlay">
  <div class="ov-icon" id="ovIcon"></div>
  <div class="ov-title" id="ovTitle"></div>
  <div class="ov-secret" id="ovSecret"></div>
  <div class="ov-info" id="ovInfo"></div>
  <button id="btnOvNew" onclick="newGame()"><span data-tr="▶ YENİ OYUN" data-en="▶ NEW GAME">▶ YENİ OYUN</span></button>
</div>

<script>

// ── MUSIC ENGINE ─────────────────────────────────────────────────────────────
const MUSIC = (() => {
  let ctx = null, playing = false, nodes = [], beatTimer = null;
  let masterGain = null, theme = 'default';

  const THEMES = {
    puzzle: { // Kayar Bulmaca - calm, methodical
      bpm: 90, scale: [261.63,293.66,329.63,349.23,392,440,493.88,523.25],
      bass: [65.41,73.42,82.41,87.31], bassPattern:[0,0,2,2,1,1,3,3],
      melody: [[0,2,4,5,4,2],[2,4,5,7,5,4],[0,2,4,7,5,4,2,0]],
      pad: true, arp: false, colors: 'blue'
    },
    chain: { // Zincir - mysterious, flowing
      bpm: 80, scale: [277.18,311.13,349.23,369.99,415.3,466.16,523.25,554.37],
      bass: [69.3,77.78,87.31,92.5], bassPattern:[0,2,1,3,0,2,3,1],
      melody: [[0,3,5,6,5,3],[2,5,6,7,6,5,3],[0,2,5,7,6,5,2]],
      pad: true, arp: true, colors: 'purple'
    },
    nonogram: { // Nonogram - pixelated, retro game
      bpm: 120, scale: [261.63,293.66,329.63,392,440,523.25,587.33,659.25],
      bass: [65.41,82.41,98,110], bassPattern:[0,0,1,0,2,0,1,3],
      melody: [[0,2,3,5,3,2],[2,3,5,7,5,3],[0,5,3,2,0,2,3,5]],
      pad: false, arp: true, colors: 'green'
    },
    wordle: { // Wordle - tense, thinking
      bpm: 75, scale: [246.94,277.18,311.13,329.63,369.99,415.3,466.16,493.88],
      bass: [61.74,69.3,77.78,82.41], bassPattern:[0,1,0,2,0,1,3,0],
      melody: [[0,1,3,4,3,1],[1,3,4,5,4,3,1],[0,3,4,6,4,3,1,0]],
      pad: true, arp: false, colors: 'green2'
    },
    mastermind: { // Mastermind - spy thriller, intense
      bpm: 100, scale: [233.08,261.63,277.18,311.13,369.99,415.3,466.16,493.88],
      bass: [58.27,65.41,73.42,77.78], bassPattern:[0,0,0,1,0,0,2,3],
      melody: [[0,2,1,3,2,0],[2,1,3,4,3,1],[0,3,2,5,4,2,1,0]],
      pad: true, arp: true, colors: 'blue2'
    },
    game2048: { // 2048 - driving, escalating
      bpm: 110, scale: [261.63,293.66,329.63,369.99,415.3,466.16,523.25,587.33],
      bass: [65.41,73.42,82.41,92.5], bassPattern:[0,2,0,3,1,2,0,3],
      melody: [[0,2,4,6,4,2],[2,4,6,7,6,4],[0,4,6,7,5,3,1,0]],
      pad: false, arp: true, colors: 'orange'
    }
  };

  let melodyIdx = 0, beatCount = 0, barCount = 0;

  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.18;
      masterGain.connect(ctx.destination);
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function osc(freq, type, vol, start, dur, targetFreq) {
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.connect(g); g.connect(masterGain);
    o.type = type;
    o.frequency.setValueAtTime(freq, start);
    if (targetFreq) o.frequency.linearRampToValueAtTime(targetFreq, start + dur * 0.8);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.015);
    g.gain.setValueAtTime(vol, start + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    o.start(start); o.stop(start + dur + 0.05);
    return o;
  }

  function playBeat() {
    if (!playing) return;
    const c = getCtx();
    const t = c.currentTime;
    const cfg = THEMES[theme];
    const spb = 60 / cfg.bpm; // seconds per beat
    const beat = beatCount % 8;
    const bar  = Math.floor(beatCount / 8);

    // ── BASS ──
    const bassNote = cfg.bass[cfg.bassPattern[beat % cfg.bassPattern.length]];
    if (beat % 2 === 0) {
      osc(bassNote, 'triangle', 0.5, t, spb * 1.8);
      osc(bassNote * 2, 'sine', 0.15, t, spb * 0.9);
    }

    // ── DRUMS / RHYTHM ──
    if (beat === 0 || beat === 4) { // kick
      const ko = c.createOscillator(), kg = c.createGain();
      ko.connect(kg); kg.connect(masterGain);
      ko.frequency.setValueAtTime(150, t);
      ko.frequency.exponentialRampToValueAtTime(40, t + 0.15);
      kg.gain.setValueAtTime(0.7, t);
      kg.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      ko.start(t); ko.stop(t + 0.2);
    }
    if (beat === 2 || beat === 6) { // snare
      const buf = c.createBuffer(1, c.sampleRate * 0.12, c.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*20);
      const sn = c.createBufferSource(), sg = c.createGain();
      const sf = c.createBiquadFilter(); sf.type='bandpass'; sf.frequency.value=2000;
      sn.buffer=buf; sn.connect(sf); sf.connect(sg); sg.connect(masterGain);
      sg.gain.setValueAtTime(0.35, t);
      sg.gain.exponentialRampToValueAtTime(0.001, t+0.12);
      sn.start(t); sn.stop(t+0.13);
    }
    // hihat
    {
      const buf = c.createBuffer(1, c.sampleRate * 0.06, c.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*30);
      const hn = c.createBufferSource(), hg = c.createGain();
      const hf = c.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=7000;
      hn.buffer=buf; hn.connect(hf); hf.connect(hg); hg.connect(masterGain);
      hg.gain.setValueAtTime(beat%2===0?0.2:0.1, t);
      hg.gain.exponentialRampToValueAtTime(0.001, t+0.06);
      hn.start(t); hn.stop(t+0.07);
    }

    // ── MELODY ──
    if (beat % 2 === 0) {
      const mel = cfg.melody[barCount % cfg.melody.length];
      const ni = Math.floor((beat/2)) % mel.length;
      const freq = cfg.scale[mel[ni] % cfg.scale.length];
      osc(freq, 'triangle', 0.22, t + 0.01, spb * 1.6);
      // harmony 3rd above
      if (beat === 0 && barCount % 2 === 0) {
        const hi = (mel[ni] + 2) % cfg.scale.length;
        osc(cfg.scale[hi], 'sine', 0.08, t + 0.02, spb * 3);
      }
    }

    // ── ARP ──
    if (cfg.arp && beat % 1 === 0) {
      const arpScale = cfg.scale;
      const ai = (beatCount * 3) % arpScale.length;
      osc(arpScale[ai] * 2, 'square', 0.04, t + spb*0.5, spb * 0.45);
    }

    // ── PAD ──
    if (cfg.pad && beat === 0) {
      const padFreqs = [cfg.scale[0], cfg.scale[2], cfg.scale[4]];
      padFreqs.forEach((f, i) => {
        osc(f, 'sine', 0.06, t + i*0.05, spb * 7.5);
      });
    }

    beatCount++;
    if (beatCount % 8 === 0) barCount++;

    beatTimer = setTimeout(playBeat, spb * 1000 - 5);
  }

  function fadeIn() {
    if (!masterGain) return;
    masterGain.gain.setValueAtTime(0, getCtx().currentTime);
    masterGain.gain.linearRampToValueAtTime(0.18, getCtx().currentTime + 2);
  }

  function fadeOut(cb) {
    if (!masterGain) { if(cb) cb(); return; }
    masterGain.gain.setValueAtTime(masterGain.gain.value, getCtx().currentTime);
    masterGain.gain.linearRampToValueAtTime(0, getCtx().currentTime + 1.5);
    setTimeout(() => { playing = false; clearTimeout(beatTimer); if(cb)cb(); }, 1600);
  }

  return {
    start(t = 'default') {
      if (playing) return;
      theme = THEMES[t] ? t : 'puzzle';
      playing = true; beatCount = 0; barCount = 0; melodyIdx = 0;
      getCtx();
      fadeIn();
      playBeat();
    },
    stop(cb) { fadeOut(cb); },
    setTheme(t) {
      if (theme === t) return;
      fadeOut(() => { if(playing || true){ theme=t; playing=true; beatCount=0; barCount=0; fadeIn(); playBeat(); } });
    },
    isPlaying() { return playing; },
    setVol(v) { if(masterGain) masterGain.gain.value = v; },
    toggle(t) {
      if (playing) { fadeOut(); playing = false; return false; }
      else { this.start(t); return true; }
    }
  };
})();


// ── AUDIO ENGINE ─────────────────────────────────────────────────────────────
const SFX = (() => {
  let ctx = null;
  let muted = false;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, type, vol, attack, decay, dur) {
    if (muted) return;
    try {
      const c = ac();
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
      g.gain.setValueAtTime(0, c.currentTime);
      g.gain.linearRampToValueAtTime(vol, c.currentTime + attack);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + attack + decay);
      o.start(c.currentTime); o.stop(c.currentTime + dur);
    } catch(e){}
  }
  function chord(freqs, type, vol, dur) {
    freqs.forEach((f,i) => setTimeout(() => tone(f, type, vol, 0.01, dur, dur+0.05), i*70));
  }
  function noise(vol, dur) {
    if (muted) return;
    try {
      const c = ac();
      const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
      const src = c.createBufferSource();
      src.buffer = buf;
      const g = c.createGain();
      const f = c.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 800;
      src.connect(f); f.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(vol, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      src.start(); src.stop(c.currentTime + dur);
    } catch(e){}
  }
  return {
    toggleMute: () => { muted = !muted; return muted; },
    isMuted: () => muted,
    click:   () => tone(420, 'sine', 0.14, 0.005, 0.08, 0.09),
    tile:    () => tone(520 + Math.random()*80, 'triangle', 0.12, 0.005, 0.1, 0.11),
    merge:   (n) => { const f = 200 + Math.log2(n||2)*45; tone(f,'triangle',0.28,0.01,0.22,0.24); setTimeout(()=>tone(f*1.5,'sine',0.16,0.02,0.18,0.2),30); },
    win:     () => chord([523,659,784,1047],'sine',0.18,0.45),
    lose:    () => chord([220,185,155,130],'sawtooth',0.12,0.5),
    correct: () => chord([659,784,1047],'triangle',0.18,0.32),
    wrong:   () => { tone(180,'sawtooth',0.16,0.01,0.28,0.3); setTimeout(()=>tone(150,'sawtooth',0.1,0.01,0.2,0.22),120); },
    near:    () => tone(440,'triangle',0.15,0.01,0.15,0.17),
    type:    () => tone(600+Math.random()*200,'square',0.06,0.002,0.04,0.045),
    flip:    () => tone(300+Math.random()*150,'triangle',0.1,0.005,0.08,0.09),
    fill:    () => tone(480,'sine',0.12,0.005,0.1,0.11),
    erase:   () => noise(0.08, 0.07),
    check:   () => { tone(660,'triangle',0.15,0.01,0.12,0.14); setTimeout(()=>tone(880,'triangle',0.12,0.01,0.1,0.12),90); },
    place:   () => tone(350+Math.random()*100,'triangle',0.13,0.005,0.09,0.1),
    confirm: () => { tone(440,'triangle',0.16,0.01,0.1,0.12); setTimeout(()=>tone(550,'sine',0.13,0.01,0.1,0.12),110); },
    hit:     () => { tone(880,'sine',0.2,0.005,0.15,0.16); tone(1100,'triangle',0.12,0.01,0.1,0.12); },
    near2:   () => tone(550,'triangle',0.15,0.005,0.12,0.13),
    delete:  () => tone(300,'triangle',0.1,0.003,0.06,0.07),
    reveal:  () => { chord([330,415,523,659],'sine',0.14,0.35); },
  };
})();

// ── CONFIG ────────────────────────────────────────────────────────────────────
const COLORS = ['c1','c2','c3','c4','c5','c6'];
const COLOR_NAMES = [(__LANG==='en'?'Red':'Kırmızı'),'Turuncu',(__LANG==='en'?'Yellow':'Sarı'),(__LANG==='en'?'Green':'Yeşil'),'Mavi','Mor'];

let POSITIONS = 4;
let COLOR_COUNT = 6;
let MAX_GUESSES = 10;

let secret = [];
let currentGuess = [];
let currentRow = 0;
let selectedColor = null;
let gameOver = false;
let wins = 0, plays = 0, best = Infinity;

// ── GENERATE SECRET ───────────────────────────────────────────────────────────
function genSecret(){
  const pool = COLORS.slice(0, COLOR_COUNT);
  return Array.from({length: POSITIONS}, () => pool[Math.floor(Math.random() * pool.length)]);
}

// ── SCORE ─────────────────────────────────────────────────────────────────────
function scoreGuess(guess){
  let hits = 0, nears = 0;
  const s = [...secret], g = [...guess];
  // exact
  for(let i = 0; i < POSITIONS; i++){
    if(g[i] === s[i]){ hits++; s[i] = null; g[i] = null; }
  }
  // near
  for(let i = 0; i < POSITIONS; i++){
    if(!g[i]) continue;
    const idx = s.indexOf(g[i]);
    if(idx !== -1){ nears++; s[idx] = null; }
  }
  return {hits, nears};
}

// ── BUILD UI ──────────────────────────────────────────────────────────────────
function buildBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  for(let r = 0; r < MAX_GUESSES; r++){
    const row = document.createElement('div');
    row.className = 'guess-row' + (r === 0 ? ' active' : '');
    row.id = `row${r}`;

    const num = document.createElement('div');
    num.className = 'row-num';
    num.textContent = (MAX_GUESSES - r).toString().padStart(2,'0');
    row.appendChild(num);

    const pegs = document.createElement('div');
    pegs.className = 'pegs';
    for(let c = 0; c < POSITIONS; c++){
      const peg = document.createElement('div');
      peg.className = 'peg';
      peg.id = `peg${r}_${c}`;
      peg.onclick = () => placePeg(r, c);
      pegs.appendChild(peg);
    }
    row.appendChild(pegs);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.id = `fb${r}`;
    for(let i = 0; i < POSITIONS; i++){
      const fp = document.createElement('div');
      fp.className = 'fb-peg';
      fp.id = `fp${r}_${i}`;
      fb.appendChild(fp);
    }
    row.appendChild(fb);
    board.appendChild(row);
  }
}

function buildPalette(){
  const pal = document.getElementById('palette');
  pal.innerHTML = '';
  for(let i = 0; i < COLOR_COUNT; i++){
    const p = document.createElement('div');
    p.className = `pal-peg p${i+1}`;
    p.id = `palp${i}`;
    p.title = COLOR_NAMES[i];
    p.onclick = () => selectColor(COLORS[i]);
    pal.appendChild(p);
  }
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function selectColor(c){
  if(gameOver) return;
  selectedColor = c; SFX.click();
  document.querySelectorAll('.pal-peg').forEach(p => p.classList.remove('selected'));
  const idx = COLORS.indexOf(c);
  document.getElementById(`palp${idx}`).classList.add('selected');
  showMsg(`// ${COLOR_NAMES[idx]} seçildi — pozisyona tıkla`);
}

function placePeg(row, col){
  if(gameOver || row !== currentRow || !selectedColor) return;
  SFX.place(); currentGuess[col] = selectedColor;
  const peg = document.getElementById(`peg${row}_${col}`);
  peg.className = `peg ${selectedColor}`;
  checkConfirmable();
}

function checkConfirmable(){
  const ready = currentGuess.filter(Boolean).length === POSITIONS;
  document.getElementById('btnConfirm').disabled = !ready;
}

function clearRow(){
  if(gameOver) return;
  currentGuess = Array(POSITIONS).fill(null);
  for(let c = 0; c < POSITIONS; c++){
    document.getElementById(`peg${currentRow}_${c}`).className = 'peg';
  }
  document.getElementById('btnConfirm').disabled = true;
  SFX.erase(); showMsg('// Temizlendi');
}

function confirmRow(){ SFX.confirm();
  if(gameOver || currentGuess.filter(Boolean).length < POSITIONS) return;
  const {hits, nears} = scoreGuess(currentGuess);

  // lock pegs
  for(let c = 0; c < POSITIONS; c++){
    document.getElementById(`peg${currentRow}_${c}`).classList.add('locked');
  }

  // show feedback — sorted: hits first, then nears
  const fbOrder = [...Array(hits).fill('hit'), ...Array(nears).fill('near'), ...Array(POSITIONS-hits-nears).fill('')];
  fbOrder.forEach((type, i) => {
    setTimeout(() => {
      const fp = document.getElementById(`fp${currentRow}_${i}`);
      if(type){fp.classList.add(type); if(type==='hit')SFX.hit(); else SFX.near2();}
    }, i * 80);
  });

  // deactivate row
  document.getElementById(`row${currentRow}`).classList.remove('active');

  if(hits === POSITIONS){
    gameOver = true;
    wins++; plays++;
    if(currentRow + 1 < best) best = currentRow + 1;
    updateStats();
    SFX.win(); setTimeout(() => showResult(true), 400);
    return;
  }

  currentRow++;
  if(currentRow >= MAX_GUESSES){
    gameOver = true;
    plays++;
    updateStats();
    revealSecret();
    SFX.lose(); setTimeout(() => showResult(false), 600);
    return;
  }

  // activate next row
  document.getElementById(`row${currentRow}`).classList.add('active');
  currentGuess = Array(POSITIONS).fill(null);
  document.getElementById('btnConfirm').disabled = true;
  showMsg(`// ${hits} doğru konum · ${nears} doğru renk · ${MAX_GUESSES - currentRow} hak kaldı`);
}

function revealSecret(){
  const sr = document.getElementById('secretRow');
  sr.innerHTML = '';
  secret.forEach(c => {
    const p = document.createElement('div');
    p.className = `peg ${c}`;
    p.style.cssText = 'width:40px;height:40px;flex-shrink:0;';
    sr.appendChild(p);
  });
  sr.classList.add('show');
}

function showResult(won){
  document.getElementById('ovIcon').textContent = won ? '🔓' : '🔒';
  document.getElementById('ovTitle').textContent = won ? 'KOD KIRILDI!' : (__LANG==='en'?'FAILED':'BAŞARISIZ');
  document.getElementById('ovTitle').className = 'ov-title ' + (won ? 'win' : 'lose');

  // secret pegs in overlay
  const ovS = document.getElementById('ovSecret');
  ovS.innerHTML = '';
  secret.forEach(c => {
    const p = document.createElement('div');
    p.className = `peg ${c}`;
    p.style.cssText = 'width:38px;height:38px;flex-shrink:0;';
    ovS.appendChild(p);
  });

  document.getElementById('ovInfo').innerHTML = won
    ? (__LANG==="en"?`Cracked in <span>${currentRow}</span> attempts!<br>Secret code above ↑`:`<span>${currentRow}</span>. denemede kırdın!<br>Gizli kod yukarıda ↑`)
    : (__LANG==="en"?"Secret code above ↑<br>Keep practicing!":"Gizli kod yukarıda ↑<br>Daha fazla pratik yap!");

  setTimeout(() => document.getElementById('overlay').classList.add('show'), 300);
}

function showMsg(txt){
  const el = document.getElementById('msg');
  el.textContent = txt;
}

function updateStats(){
  document.getElementById('sWin').textContent = wins;
  document.getElementById('sPlay').textContent = plays;
  document.getElementById('sBest').textContent = best === Infinity ? '-' : best;
}

// ── DIFFICULTY ────────────────────────────────────────────────────────────────
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const [p, c, m] = btn.dataset.d.split(',').map(Number);
    POSITIONS = p; COLOR_COUNT = c; MAX_GUESSES = m;
    newGame();
  });
});

// ── NEW GAME ──────────────────────────────────────────────────────────────────
function newGame(){
  document.getElementById('overlay').classList.remove('show');
  secret = genSecret();
  currentGuess = Array(POSITIONS).fill(null);
  currentRow = 0; gameOver = false; selectedColor = null;
  document.getElementById('btnConfirm').disabled = true;
  document.getElementById('secretRow').classList.remove('show');
  document.getElementById('secretRow').innerHTML = '';
  document.querySelectorAll('.pal-peg').forEach(p => p.classList.remove('selected'));
  buildBoard();
  buildPalette();
  showMsg('// Renk seç, pozisyona tıkla, onayla');
}

newGame();
</script>

  const m = SFX.toggleMute();
  document.getElementById('muteBtn').textContent = m ? '🔇' : '🔊';
});});

  const btn = document.getElementById('musicBtn');
  btn.classList.toggle('on', on);
  btn.textContent = on ? '🎵' : '🔇';
  btn.title = on ? (__LANG==='en'?'Music Off':'Müziği kapat') : (__LANG==='en'?'Music On':'Müziği aç');
});
// Auto-start music on first interaction
document.addEventListener('click', function startMusic() {
  if (!MUSIC.isPlaying()) {
    MUSIC.start('mastermind');
    document.getElementById('musicBtn').classList.add('on');
    document.getElementById('musicBtn').textContent = '🎵';
  }
  document.removeEventListener('click', startMusic);
}, { once: false });

</script>
